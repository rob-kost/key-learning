name: CI Pipeline

on:
  push:
    branches: [ h2-try-branch ]
  pull_request:
    branches: [ h2-try-branch ]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Oracle OpenJDK)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload backend artifact (distZip)
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/build/distributions/*.zip

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ./frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('./frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: |
            frontend
            !frontend/node_modules/**

  deploy:
    name: Deploy (smoke test with H2)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend

      - name: Set up JDK 21 (Oracle OpenJDK)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'

      - name: Unpack backend and prepare
        run: |
          unzip *.zip -d backend-app
          BACKEND_BIN=$(find backend-app -type f -path '*/bin/*' ! -name '*.bat' | head -1)
          chmod +x "$BACKEND_BIN"
          echo "BACKEND_BIN=$BACKEND_BIN" >> $GITHUB_ENV

      - name: Start backend with H2 and verify
        env:
          DB_TYPE: h2
        run: |
          $BACKEND_BIN &
          BACKEND_PID=$!
          sleep 5
          # Проверяем, что процесс жив
          if ! kill -0 $BACKEND_PID 2>/dev/null; then
            echo "Backend process died" && exit 1
          fi
          # Пробуем достучаться до порта 8228
          for i in {1..10}; do
            if curl -s http://localhost:8228 > /dev/null; then
              echo "Backend is responding on port 8228"
              break
            fi
            sleep 2
          done
          # Финальная проверка
          if ! curl -s http://localhost:8228 > /dev/null; then
            echo "Backend did not respond" && exit 1
          fi
          # Останавливаем процесс
          kill $BACKEND_PID || true

      - name: Verify frontend structure
        run: |
          if [ ! -f "server.js" ]; then
            echo "server.js not found!" && exit 1
          fi
          if [ ! -f "package.json" ]; then
            echo "package.json not found!" && exit 1
          fi
          npm install
          echo "Frontend structure OK"