name: CI Pipeline

on:
  push:
    branches: [ main, vps-server-setting-branch ]
  pull_request:
    branches: [ main, vps-server-setting-branch ]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Oracle OpenJDK)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload backend artifact (distZip)
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/build/distributions/*.zip

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ./frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('./frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Fix jest permissions
        run: chmod +x node_modules/.bin/jest

      - name: Run tests
        run: npm test

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: |
            frontend/**
            !frontend/node_modules/**

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key

      - name: Stop existing services
        run: |
          ssh -i ~/.ssh/deploy-key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "sudo systemctl stop keylearning-backend keylearning-frontend || true"

      - name: Prepare backend directory on server
        run: |
          ssh -i ~/.ssh/deploy-key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /opt/keylearning/backend/bin /opt/keylearning/backend/lib"

      - name: Copy backend artifact to server
        run: |
          scp -i ~/.ssh/deploy-key -o StrictHostKeyChecking=no *.zip ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/backend.zip

      - name: Install backend on server
        run: |
          ssh -i ~/.ssh/deploy-key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'REMOTE'
            set -e
            cd /tmp
            unzip -o backend.zip -d backend-dist
            BIN_SCRIPT=$(find backend-dist -type f -path '*/bin/*' ! -name '*.bat' | head -1)
            if [ -z "$BIN_SCRIPT" ]; then
              echo "ERROR: start script not found" >&2
              exit 1
            fi
            cp "$BIN_SCRIPT" /opt/keylearning/backend/bin/key-learning-backend
            chmod +x /opt/keylearning/backend/bin/key-learning-backend
            rm -rf /opt/keylearning/backend/lib/*
            cp backend-dist/*/lib/*.jar /opt/keylearning/backend/lib/ 2>/dev/null || true
          REMOTE

      - name: Create .env file locally
        run: |
          cat > .env << EOF
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          EOF

      - name: Copy .env to server
        run: |
          scp -i ~/.ssh/deploy-key -o StrictHostKeyChecking=no .env ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/keylearning/backend/.env

      - name: Run Flyway migrations
        run: |
          ssh -i ~/.ssh/deploy-key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -a
            source /opt/keylearning/backend/.env
            set +a
            java -cp '/opt/keylearning/backend/lib/*' su.itgalley.database.config.migrations.FlywayMigratorKt migrate
          "

      - name: Copy frontend files to server
        run: |
          scp -i ~/.ssh/deploy-key -o StrictHostKeyChecking=no -r * ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/keylearning/frontend/

      - name: Install frontend dependencies on server
        run: |
          ssh -i ~/.ssh/deploy-key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd /opt/keylearning/frontend && npm install"

      - name: Start backend service
        run: |
          ssh -i ~/.ssh/deploy-key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "sudo systemctl start keylearning-backend"

      - name: Start frontend service
        run: |
          ssh -i ~/.ssh/deploy-key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "sudo systemctl start keylearning-frontend"

      - name: Verify services are running (best effort)
        run: |
          ssh -i ~/.ssh/deploy-key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "systemctl is-active keylearning-backend || echo 'Backend not active (maybe DB missing?)'; systemctl is-active keylearning-frontend || echo 'Frontend not active'"