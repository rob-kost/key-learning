name: CI Pipeline

on:
  push:
    branches: [ main , cd-setting-branch ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Oracle OpenJDK)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload backend artifact (distZip)
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/build/distributions/*.zip

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ./frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('./frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: |
            frontend/**
            !frontend/node_modules/**

  deploy:
    name: Deploy (demonstration)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend

      - name: Set up JDK 21 (Oracle OpenJDK)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'

      - name: Unpack backend dist and prepare
        run: |
          unzip *.zip -d backend-app
          BACKEND_BIN=$(find backend-app -type f -path '*/bin/*' ! -name '*.bat' | head -1)
          chmod +x "$BACKEND_BIN"
          echo "BACKEND_BIN=$BACKEND_BIN" >> $GITHUB_ENV

      - name: Start backend (test run)
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          $BACKEND_BIN &
          sleep 5
          if ! pgrep -f "java"; then
            echo "Backend failed to start" && exit 1
          fi

      - name: Install frontend dependencies and start
        run: |
          cd frontend
          npm install
          node server.js &
          sleep 3
          if ! pgrep -f "node server.js"; then
            echo "Frontend failed to start" && exit 1
          fi
