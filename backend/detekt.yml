config:
  validation: true
  warningsAsErrors: true

style:
  ReturnCount:
    excludeGuardClauses: true
  WildcardImport:
    excludeImports:
      - 'org.assertj.*'
      - 'org.mockito.*'
      - 'org.http4k.*'
      - 'dev.forkhandles.result4k.*'
      - 'su.itgalley.*'
      - 'kotlin.io.path'
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2', '8228']
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
complexity:
  LongMethod:
    active: true
    threshold: 80 
